name: HIPAA Healthcare Platform Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hipaa-patient-records-api
  ECS_CLUSTER: cloudops-cluster
  ECS_SERVICE: cloudops-api-service
  CONTAINER_NAME: cloudops-api

permissions:
  id-token: write
  contents: read

jobs:

  checkov-scan:
    name: Checkov HIPAA IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          soft_fail: true

  trivy-scan:
    name: Build and Trivy Scan
    runs-on: ubuntu-latest
    needs: checkov-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326709068429:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t hipaa-patient-records-api:${{ github.sha }} \
            -t hipaa-patient-records-api:latest \
            ./app

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hipaa-patient-records-api:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag hipaa-patient-records-api:latest \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker tag hipaa-patient-records-api:latest \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

  npm-audit:
    name: NodeJS Security Audit
    runs-on: ubuntu-latest
    needs: checkov-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd app && npm install

      - name: Run npm audit
        run: cd app && npm audit --audit-level=high || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          if-no-files-found: ignore

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [trivy-scan, npm-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326709068429:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition cloudops-api \
            --query taskDefinition \
            > task-def.json

      - name: Update task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  security-summary:
    name: HIPAA Security Summary
    runs-on: ubuntu-latest
    needs: [checkov-scan, trivy-scan, npm-audit, deploy]
    if: always()
    steps:
      - name: Print HIPAA security summary
        run: |
          echo "============================================"
          echo "   HIPAA HEALTHCARE PLATFORM SECURITY"
          echo "============================================"
          echo "Checkov IaC Scan    : ${{ needs.checkov-scan.result }}"
          echo "Trivy Container Scan: ${{ needs.trivy-scan.result }}"
          echo "NodeJS npm audit    : ${{ needs.npm-audit.result }}"
          echo "ECS Deployment      : ${{ needs.deploy.result }}"
          echo "============================================"
          echo "HIPAA Controls:"
          echo "  PHI Encryption    : KMS AES-256"
          echo "  Audit Logging     : CloudTrail enabled"
          echo "  Access Control    : providerId required"
          echo "  Transmission      : TLS enforced"
          echo "============================================"
